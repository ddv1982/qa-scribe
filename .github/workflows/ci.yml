name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_TARGET: x86_64-unknown-linux-gnu
  # Kept in sync by hand with the identical TAURI_CLI_VERSION entry in
  # release.yml's env block (no cheap single-source available without adding
  # a repo variable out-of-band of this diff) - bump both together.
  TAURI_CLI_VERSION: 2.11.3

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-24.04
    outputs:
      run_package_ci: ${{ steps.filter.outputs.run_package_ci }}
      run_rust_ci: ${{ steps.filter.outputs.run_rust_ci }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            run_rust_ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'src-tauri/**'
              - 'frontend/**'
              - 'tests/**'
              - 'build/icons/**'
              - 'package.json'
              - 'scripts/check-release-metadata.mjs'
              - 'scripts/build_frontend_for_tauri.sh'
            run_package_ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'src-tauri/**'
              - 'frontend/**'
              - 'tests/**'
              - 'build/**'
              - 'scripts/**'
              - 'README.md'
              - 'LICENSE'
              - 'CHANGELOG.md'
              - 'package.json'

  rust-linux:
    name: Rust ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true' || needs.changes.outputs.run_package_ci == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.5'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)

      - name: Install Linux Tauri desktop dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-Linux

      - name: Validate frontend and Rust build
        uses: ./.github/actions/validate-build

  rust-macos:
    name: Rust macos-26
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true' || needs.changes.outputs.run_package_ci == 'true'
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.5'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-macOS

      - name: Validate frontend and Rust build
        uses: ./.github/actions/validate-build

      # Cheap compile-only guard for the macos-26-intel release leg: a full
      # Intel runner leg in CI is not worth the cost (slow, expensive
      # macOS runners), but a cross-target `cargo check` on the arm64 leg
      # catches x86_64-only compile breaks before they surface for the
      # first time during a release build.
      - name: Install Intel macOS Rust target
        run: rustup target add x86_64-apple-darwin

      - name: Check Intel macOS cross-compile
        run: cargo check --workspace --target x86_64-apple-darwin

  package-linux:
    name: Package Linux Rust
    needs: [changes, rust-linux]
    if: |
      always() &&
      needs.changes.outputs.run_package_ci == 'true' &&
      needs['rust-linux'].result == 'success'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.5'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)
        with:
          targets: ${{ env.TAURI_TARGET }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (post-v2.9.1, 2026-03-12)
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target
          key: rust-linux-package

      - name: Install Linux Tauri and packaging dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            zstd \
            rpm \
            rpm2cpio \
            libarchive-tools \
            desktop-file-utils \
            appstream

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      # Runs the Python unittest suite (linux:metadata:test) alongside release
      # metadata validation; ubuntu-24.04 ships python3, so no setup-python
      # step is needed. Previously this suite was never executed by CI.
      - name: Check release metadata and Python unit tests
        run: bun run release:check

      - name: Build frontend
        run: bun run frontend:build

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - name: Install Tauri CLI
        # --force: the rust cache restores ~/.cargo/.crates.toml (the install
        # manifest) without ~/.cargo/bin, so binstall would otherwise skip the
        # install as "already installed" while the binary is absent.
        run: cargo binstall tauri-cli --locked --version "=${TAURI_CLI_VERSION}" --no-confirm --force

      - name: Build Linux artifacts
        env:
          QA_SCRIBE_USE_PREBUILT_FRONTEND: '1'
        run: node scripts/package-tauri-linux.mjs

      - name: Validate Rust artifacts
        run: node scripts/check-rust-artifacts.mjs --platform linux --require-rpm --require-appimage

      - name: Validate Linux package metadata
        run: |
          set +e
          python3 scripts/validate_linux_package_metadata.py \
            "dist/rust/artifacts/*.deb" \
            "dist/rust/artifacts/*.rpm" \
            --json-report linux-package-metadata-report.json
          validator_status=$?
          set -e
          if [ -f linux-package-metadata-report.json ]; then
            node scripts/write-linux-metadata-summary.mjs linux-package-metadata-report.json
          fi
          exit "${validator_status}"

      - name: Validate APT repository generation
        run: node scripts/check-apt-repository.mjs

      - name: Validate APT installer rendering
        run: node scripts/check-apt-installer.mjs
