name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_TARGET: x86_64-unknown-linux-gnu

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run_macos_ci: ${{ steps.filter.outputs.run_macos_ci }}
      run_package_ci: ${{ steps.filter.outputs.run_package_ci }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect platform and package changes
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            run_macos_ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'src-tauri/**'
              - 'frontend/**'
              - 'build/icons/**'
              - 'package.json'
              - 'scripts/build_frontend_for_tauri.sh'
              - 'scripts/check-tauri-prebuilt-frontend.sh'
            run_package_ci:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'src-tauri/**'
              - 'frontend/**'
              - 'tests/**'
              - 'build/**'
              - 'scripts/**'
              - 'README.md'
              - 'LICENSE'
              - 'CHANGELOG.md'
              - 'package.json'

  quality-linux:
    name: Quality gate (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          cache-key: quality-linux

      - name: Install Linux Tauri desktop dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            xauth \
            xvfb

      - name: Validate project
        uses: ./.github/actions/validate-build

  rust-macos:
    name: Platform tests (macOS arm64 + Intel check)
    needs: changes
    if: needs.changes.outputs.run_macos_ci == 'true'
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          cache-key: platform-macos
          rust-targets: x86_64-apple-darwin

      - name: Build frontend
        run: bun run frontend:build

      - name: Validate Tauri prebuilt frontend contract
        run: bash scripts/check-tauri-prebuilt-frontend.sh

      - name: Run native macOS Rust tests
        run: cargo test --workspace

      - name: Check Intel macOS cross-compile
        run: cargo check --workspace --target x86_64-apple-darwin

  package-linux:
    name: Package test (Linux x64)
    needs: [changes, quality-linux]
    if: >-
      !cancelled() &&
      needs.changes.outputs.run_package_ci == 'true' &&
      needs.quality-linux.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          # This job starts after quality-linux, so it can reuse that job's
          # dependency cache instead of creating a second cache silo.
          cache-key: quality-linux
          rust-targets: ${{ env.TAURI_TARGET }}

      - name: Install Linux Tauri and packaging dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            zstd \
            rpm \
            rpm2cpio \
            libarchive-tools \
            desktop-file-utils \
            appstream

      - name: Build frontend
        run: bun run frontend:build

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - name: Install Tauri CLI
        run: bun run tauri:cli:install

      - name: Build Linux artifacts
        env:
          QA_SCRIBE_USE_PREBUILT_FRONTEND: '1'
        run: node scripts/package-tauri-linux.mjs

      - name: Validate Rust artifacts
        run: node scripts/check-rust-artifacts.mjs --platform linux --require-rpm --require-appimage

      - name: Validate Linux package metadata
        run: |
          set +e
          python3 scripts/validate_linux_package_metadata.py \
            "dist/rust/artifacts/*.deb" \
            "dist/rust/artifacts/*.rpm" \
            --json-report linux-package-metadata-report.json
          validator_status=$?
          set -e
          if [ -f linux-package-metadata-report.json ]; then
            node scripts/write-linux-metadata-summary.mjs linux-package-metadata-report.json
          fi
          exit "${validator_status}"

      - name: Validate APT repository generation
        run: node scripts/check-apt-repository.mjs

      - name: Validate APT installer rendering
        run: node scripts/check-apt-installer.mjs

  ci-success:
    name: CI success
    needs: [changes, quality-linux, rust-macos, package-linux]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Require every applicable CI job to pass
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          QUALITY_RESULT: ${{ needs.quality-linux.result }}
          MACOS_RESULT: ${{ needs.rust-macos.result }}
          PACKAGE_RESULT: ${{ needs.package-linux.result }}
        run: |
          for result in "$CHANGES_RESULT" "$QUALITY_RESULT" "$MACOS_RESULT" "$PACKAGE_RESULT"; do
            if [ "$result" != success ] && [ "$result" != skipped ]; then
              echo "An applicable CI job did not pass (result: $result)." >&2
              exit 1
            fi
          done
