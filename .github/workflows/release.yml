name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-context:
    name: Resolve Release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      should-release: ${{ steps.release.outputs.should-release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Resolve version and create missing merge tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

          node scripts/check-release-metadata.mjs --expected-tag "${tag}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "${tag}" ]; then
              echo "Pushed tag ${GITHUB_REF_NAME} does not match package version ${tag}." >&2
              exit 1
            fi
            echo "should-release=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${tag}")"
            if [ "${tagged_commit}" != "${GITHUB_SHA}" ]; then
              echo "${tag} already belongs to ${tagged_commit}; this merge did not bump the release version."
              echo "should-release=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              --field ref="refs/tags/${tag}" \
              --field sha="${GITHUB_SHA}" >/dev/null
          fi

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft')"
            if [ "${is_draft}" = "true" ]; then
              echo "Draft release ${tag} exists; resuming the release pipeline."
              echo "should-release=true" >> "${GITHUB_OUTPUT}"
            else
              echo "Release ${tag} is already published; no new release is needed."
              echo "should-release=false" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "should-release=true" >> "${GITHUB_OUTPUT}"
          fi

  validate-release:
    name: Validate Release
    needs: release-context
    if: needs.release-context.outputs.should-release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          cache-key: release-validation-linux

      - name: Install Linux Tauri desktop dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Validate frontend and Rust build
        uses: ./.github/actions/validate-build
        with:
          expected-tag: ${{ needs.release-context.outputs.tag }}

  create-release:
    name: Create Draft Release
    needs: [release-context, validate-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Extract changelog notes
        env:
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: node scripts/check-release-metadata.mjs --expected-tag "${RELEASE_TAG}" --write-notes release-notes.md

      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft')"
            if [ "${is_draft}" != "true" ]; then
              echo "Release ${RELEASE_TAG} is already published; refusing to flip it back to draft." >&2
              exit 1
            fi
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "QA Scribe ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --draft=true \
              --prerelease=false
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "QA Scribe ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --draft \
              --verify-tag \
              --latest
          fi

  build-macos-release:
    name: Build macOS ${{ matrix.arch }}
    needs: [release-context, create-release]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x64
            runner: macos-26-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          cache-key: release-macos-${{ matrix.arch }}

      - name: Build frontend
        run: bun run frontend:build

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - name: Install Tauri CLI
        # --force: the rust cache restores ~/.cargo/.crates.toml (the install
        # manifest) without ~/.cargo/bin, so binstall would otherwise skip the
        # install as "already installed" while the binary is absent.
        run: bun run tauri:cli:install

      - name: Build macOS Tauri app bundle
        env:
          QA_SCRIBE_USE_PREBUILT_FRONTEND: '1'
        run: |
          set -euo pipefail
          pushd src-tauri
          cargo tauri build --bundles app
          popd

          rm -rf "dist/rust/build/QA Scribe.app"
          mkdir -p "dist/rust/build" "dist/rust/artifacts"
          ditto "target/release/bundle/macos/QA Scribe.app" "dist/rust/build/QA Scribe.app"

      - name: Prepare Apple signing environment
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          MACOS_DEVELOPER_ID_INPUT: ${{ secrets.MACOS_DEVELOPER_ID }}
          MACOS_TEAM_ID_INPUT: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "$CSC_LINK" ] || missing+=("CSC_LINK")
          [ -n "$CSC_KEY_PASSWORD" ] || missing+=("CSC_KEY_PASSWORD")
          [ -n "$APPLE_API_KEY_BASE64" ] || missing+=("APPLE_API_KEY")
          [ -n "$APPLE_API_KEY_ID" ] || missing+=("APPLE_API_KEY_ID")
          [ -n "$APPLE_API_ISSUER" ] || missing+=("APPLE_API_ISSUER")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required macOS release secrets are missing: ${missing[*]}" >&2
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/qa-scribe-signing.keychain-db"
          keychain_password="$(uuidgen)"
          api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          MACOS_DEVELOPER_ID="${MACOS_DEVELOPER_ID_INPUT}"
          MACOS_TEAM_ID="${MACOS_TEAM_ID_INPUT}"

          printf '%s' "$CSC_LINK" | base64 --decode > "$certificate_path"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$api_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          if [ -z "${MACOS_DEVELOPER_ID}" ]; then
            MACOS_DEVELOPER_ID="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          fi

          if [ -z "${MACOS_DEVELOPER_ID}" ]; then
            MACOS_DEVELOPER_ID="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/"/ { print $2; exit }')"
          fi

          if [ -z "${MACOS_DEVELOPER_ID}" ]; then
            echo "Could not derive a codesigning identity from CSC_LINK." >&2
            security find-identity -v -p codesigning "$keychain_path" >&2 || true
            exit 1
          fi

          if [ -z "${MACOS_TEAM_ID}" ] && [[ "${MACOS_DEVELOPER_ID}" =~ \(([A-Z0-9]{10})\)$ ]]; then
            MACOS_TEAM_ID="${BASH_REMATCH[1]}"
          fi

          chmod 600 "$api_key_path"
          echo "MACOS_DEVELOPER_ID=${MACOS_DEVELOPER_ID}" >> "$GITHUB_ENV"
          if [ -n "${MACOS_TEAM_ID}" ]; then
            echo "MACOS_TEAM_ID=${MACOS_TEAM_ID}" >> "$GITHUB_ENV"
          fi
          echo "APPLE_API_KEY_PATH=${api_key_path}" >> "$GITHUB_ENV"

      - name: Sign and notarize macOS app bundle
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          app_path="dist/rust/build/QA Scribe.app"
          app_zip="${RUNNER_TEMP}/qa-scribe-app.zip"

          codesign --force --deep --timestamp --options runtime \
            --entitlements build/entitlements.mac.plist \
            --sign "${MACOS_DEVELOPER_ID}" \
            "${app_path}"
          codesign --verify --deep --strict --verbose=2 "${app_path}"

          ditto -c -k --keepParent "${app_path}" "${app_zip}"
          bash scripts/notarize-macos-artifact.sh "${app_zip}"
          xcrun stapler staple "${app_path}"
          xcrun stapler validate "${app_path}"
          spctl --assess --verbose --type exec "${app_path}"

      - name: Build, sign, and notarize macOS DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          MACOS_ARCH="${{ matrix.arch }}" node scripts/package-rust-macos.mjs --skip-build --dmg-only
          dmg="dist/rust/artifacts/$(MACOS_ARCH="${{ matrix.arch }}" node --input-type=module -e "
            import { readFileSync } from 'node:fs'
            import { macosDmgName } from './scripts/command-utils.mjs'
            const version = JSON.parse(readFileSync('package.json', 'utf8')).version
            console.log(macosDmgName(version, process.env.MACOS_ARCH))
          ")"

          codesign --force --timestamp --sign "${MACOS_DEVELOPER_ID}" "${dmg}"
          codesign --verify --verbose=2 "${dmg}"
          bash scripts/notarize-macos-artifact.sh "${dmg}"
          xcrun stapler staple "${dmg}"
          xcrun stapler validate "${dmg}"
          spctl --assess --verbose --type open --context context:primary-signature "${dmg}"

      - name: Validate macOS artifacts
        run: node scripts/check-rust-artifacts.mjs --platform macos --require-dmg

      - name: Stage macOS release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-macos-${{ matrix.arch }}
          path: dist/rust/artifacts/*.dmg
          if-no-files-found: error
          retention-days: 1

  build-linux-release:
    name: Build Linux x64
    needs: [release-context, create-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          cache-key: release-linux
          rust-targets: x86_64-unknown-linux-gnu

      - name: Install Linux Tauri and packaging dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            pkg-config \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            zstd \
            rpm \
            rpm2cpio \
            libarchive-tools \
            desktop-file-utils \
            appstream \
            gnupg

      - name: Build frontend
        run: bun run frontend:build

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - name: Install Tauri CLI
        # --force: the rust cache restores ~/.cargo/.crates.toml (the install
        # manifest) without ~/.cargo/bin, so binstall would otherwise skip the
        # install as "already installed" while the binary is absent.
        run: bun run tauri:cli:install

      - name: Build Linux artifacts
        env:
          QA_SCRIBE_USE_PREBUILT_FRONTEND: '1'
          TAURI_TARGET: x86_64-unknown-linux-gnu
        run: node scripts/package-tauri-linux.mjs

      - name: Validate Linux artifacts
        run: node scripts/check-rust-artifacts.mjs --platform linux --require-rpm --require-appimage

      - name: Validate Linux package metadata
        run: |
          set +e
          python3 scripts/validate_linux_package_metadata.py \
            "dist/rust/artifacts/*.deb" \
            "dist/rust/artifacts/*.rpm" \
            --json-report linux-package-metadata-report.json
          validator_status=$?
          set -e
          if [ -f linux-package-metadata-report.json ]; then
            node scripts/write-linux-metadata-summary.mjs linux-package-metadata-report.json
          fi
          exit "${validator_status}"

      - name: Build signed APT repository and checksums
        env:
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
          DEB_SIGNING_PUBLIC_KEY: ${{ vars.DEB_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PRIVATE_KEY}" ] || missing+=("DEB_SIGNING_PRIVATE_KEY")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")
          [ -n "${DEB_SIGNING_KEY_PASSPHRASE}" ] || missing+=("DEB_SIGNING_KEY_PASSPHRASE")
          [ -n "${DEB_SIGNING_PUBLIC_KEY}" ] || missing+=("DEB_SIGNING_PUBLIC_KEY repository variable")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required Linux signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi

          gnupg_home="${RUNNER_TEMP}/linux-signing-gnupg"
          verification_home="${RUNNER_TEMP}/linux-signing-verify-gnupg"
          private_key_file="${RUNNER_TEMP}/linux-signing-private-key.asc"
          public_key_file="${RUNNER_TEMP}/linux-signing-public-key.asc"
          passphrase_file="${RUNNER_TEMP}/linux-signing-passphrase"

          rm -rf "${gnupg_home}" "${verification_home}"
          mkdir -p "${gnupg_home}" "${verification_home}"
          chmod 700 "${gnupg_home}" "${verification_home}"

          printf '%s' "${DEB_SIGNING_PRIVATE_KEY}" | base64 --decode > "${private_key_file}"
          printf '%s' "${DEB_SIGNING_PUBLIC_KEY}" | base64 --decode > "${public_key_file}"
          printf '%s' "${DEB_SIGNING_KEY_PASSPHRASE}" > "${passphrase_file}"
          chmod 600 "${passphrase_file}"

          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          gpg --batch --import "${private_key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported Linux signing key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          GNUPGHOME="${verification_home}" gpg --batch --import "${public_key_file}"

          python3 scripts/build_apt_repository.py "dist/rust/artifacts/*.deb" \
            --output dist/rust/apt-pages/apt \
            --repository-url "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/apt/" \
            --gpg-key "${expected_fingerprint}" \
            --gpg-homedir "${gnupg_home}" \
            --gpg-passphrase-file "${passphrase_file}" \
            --public-key-out dist/rust/artifacts/qa-scribe-archive-keyring.pgp \
            --setup-package-out dist/rust/artifacts/qa-scribe-repository-setup_1.0_all.deb \
            --clean
          cp dist/rust/artifacts/qa-scribe-archive-keyring.pgp \
            dist/rust/apt-pages/apt/qa-scribe-archive-keyring.pgp

          setup_deb="dist/rust/artifacts/qa-scribe-repository-setup_1.0_all.deb"
          setup_sha256="${setup_deb}.sha256"
          setup_sha256_sig="${setup_sha256}.asc"

          (cd "$(dirname "${setup_deb}")" && sha256sum "$(basename "${setup_deb}")" > "$(basename "${setup_sha256}")")
          GNUPGHOME="${gnupg_home}" gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "${passphrase_file}" \
            --local-user "${expected_fingerprint}" --armor --detach-sign \
            --output "${setup_sha256_sig}" "${setup_sha256}"
          GNUPGHOME="${verification_home}" gpg --quiet --batch --trust-model always --verify "${setup_sha256_sig}" "${setup_sha256}"

      - name: Clean up Linux signing environment
        if: always()
        run: |
          set -euo pipefail

          GNUPGHOME="${RUNNER_TEMP}/linux-signing-gnupg" gpgconf --kill gpg-agent || true
          rm -rf \
            "${RUNNER_TEMP}/linux-signing-gnupg" \
            "${RUNNER_TEMP}/linux-signing-verify-gnupg" \
            "${RUNNER_TEMP}/linux-signing-private-key.asc" \
            "${RUNNER_TEMP}/linux-signing-public-key.asc" \
            "${RUNNER_TEMP}/linux-signing-passphrase"

      - name: Stage APT repository installer
        env:
          LINUX_GPG_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
        run: |
          set -euo pipefail

          installer="dist/rust/artifacts/install-apt-repo.sh"
          sed "s/__QA_SCRIBE_APT_SIGNING_KEY_FINGERPRINT__/${LINUX_GPG_FINGERPRINT}/g" \
            scripts/install-apt-repo.sh > "${installer}"
          chmod 0755 "${installer}"

          node scripts/check-apt-installer.mjs \
            --rendered-installer "${installer}" \
            --expected-fingerprint "${LINUX_GPG_FINGERPRINT}"
          sh -n "${installer}"

      - name: Stage public APT installer assets
        env:
          LINUX_GPG_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
        run: |
          set -euo pipefail

          cp dist/rust/artifacts/install-apt-repo.sh \
            dist/rust/apt-pages/install-apt-repo.sh
          cp dist/rust/artifacts/qa-scribe-repository-setup_1.0_all.deb \
            dist/rust/apt-pages/apt/qa-scribe-repository-setup_1.0_all.deb
          cp dist/rust/artifacts/qa-scribe-repository-setup_1.0_all.deb.sha256 \
            dist/rust/apt-pages/apt/qa-scribe-repository-setup_1.0_all.deb.sha256
          cp dist/rust/artifacts/qa-scribe-repository-setup_1.0_all.deb.sha256.asc \
            dist/rust/apt-pages/apt/qa-scribe-repository-setup_1.0_all.deb.sha256.asc
          node scripts/check-apt-installer.mjs \
            --rendered-installer dist/rust/apt-pages/install-apt-repo.sh \
            --expected-fingerprint "${LINUX_GPG_FINGERPRINT}"
          sh -n dist/rust/apt-pages/install-apt-repo.sh

      - name: Stage Linux release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-linux-x64
          path: |
            dist/rust/artifacts/qa-scribe-*.rpm
            dist/rust/artifacts/*.AppImage
            dist/rust/artifacts/qa-scribe_*.deb
            dist/rust/artifacts/qa-scribe-repository-setup_*.deb
            dist/rust/artifacts/qa-scribe-repository-setup_*.deb.sha256
            dist/rust/artifacts/qa-scribe-repository-setup_*.deb.sha256.asc
            dist/rust/artifacts/install-apt-repo.sh
          if-no-files-found: error
          retention-days: 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload APT repository pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/rust/apt-pages

  publish-release-assets:
    name: Publish Release Assets
    needs: [release-context, build-macos-release, build-linux-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download staged release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-assets-*
          path: dist/rust/release-assets
          merge-multiple: true

      - name: Upload release assets to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(dist/rust/release-assets/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No staged release assets found to upload." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  sign-release-checksums:
    name: Sign Release Checksums
    needs: [release-context, publish-release-assets]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/rust/release-assets
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/rust/release-assets \
            --clobber

      # Same GPG signing pattern as the setup .deb checksum in
      # build-linux-release (release.yml ~line 459), but covering every
      # asset attached to the release rather than a single package.
      - name: Generate and sign SHA256SUMS for all release assets
        env:
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEB_SIGNING_PRIVATE_KEY}" ] || missing+=("DEB_SIGNING_PRIVATE_KEY")
          [ -n "${DEB_SIGNING_KEY_FINGERPRINT}" ] || missing+=("DEB_SIGNING_KEY_FINGERPRINT")
          [ -n "${DEB_SIGNING_KEY_PASSPHRASE}" ] || missing+=("DEB_SIGNING_KEY_PASSPHRASE")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required release checksum signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi

          gnupg_home="${RUNNER_TEMP}/release-sums-gnupg"
          private_key_file="${RUNNER_TEMP}/release-sums-private-key.asc"
          passphrase_file="${RUNNER_TEMP}/release-sums-passphrase"

          rm -rf "${gnupg_home}"
          mkdir -p "${gnupg_home}"
          chmod 700 "${gnupg_home}"

          printf '%s' "${DEB_SIGNING_PRIVATE_KEY}" | base64 --decode > "${private_key_file}"
          printf '%s' "${DEB_SIGNING_KEY_PASSPHRASE}" > "${passphrase_file}"
          chmod 600 "${passphrase_file}"

          export GNUPGHOME="${gnupg_home}"
          echo allow-loopback-pinentry > "${GNUPGHOME}/gpg-agent.conf"
          gpgconf --kill gpg-agent || true
          gpg --batch --import "${private_key_file}"

          expected_fingerprint="$(printf '%s' "${DEB_SIGNING_KEY_FINGERPRINT}" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "${expected_fingerprint}" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [ "${imported_fingerprint}" != "${expected_fingerprint}" ]; then
            echo "Imported release checksum signing key fingerprint did not match DEB_SIGNING_KEY_FINGERPRINT." >&2
            exit 1
          fi

          sums_file="dist/rust/release-assets/SHA256SUMS"
          # Drop any SHA256SUMS(.asc) downloaded from a prior run of this job
          # for the same tag so re-runs don't hash a stale checksum file into
          # the new one.
          rm -f "${sums_file}" "${sums_file}.asc"
          (cd dist/rust/release-assets && sha256sum -- * > "$(basename "${sums_file}")")

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "${passphrase_file}" \
            --local-user "${expected_fingerprint}" --armor --detach-sign \
            --output "${sums_file}.asc" "${sums_file}"

      - name: Verify release checksum signature
        env:
          # The public key is a repository *variable*, not a secret (it is
          # public by definition) — same source as the APT publish job above.
          DEB_SIGNING_PUBLIC_KEY: ${{ vars.DEB_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          verification_home="${RUNNER_TEMP}/release-sums-verify-gnupg"
          public_key_file="${RUNNER_TEMP}/release-sums-public-key.asc"

          rm -rf "${verification_home}"
          mkdir -p "${verification_home}"
          chmod 700 "${verification_home}"

          printf '%s' "${DEB_SIGNING_PUBLIC_KEY}" | base64 --decode > "${public_key_file}"

          GNUPGHOME="${verification_home}" gpg --batch --import "${public_key_file}"

          sums_file="dist/rust/release-assets/SHA256SUMS"
          GNUPGHOME="${verification_home}" gpg --quiet --batch --trust-model always --verify "${sums_file}.asc" "${sums_file}"

      - name: Clean up release checksum signing environment
        if: always()
        run: |
          set -euo pipefail
          GNUPGHOME="${RUNNER_TEMP}/release-sums-gnupg" gpgconf --kill gpg-agent || true
          rm -rf \
            "${RUNNER_TEMP}/release-sums-gnupg" \
            "${RUNNER_TEMP}/release-sums-verify-gnupg" \
            "${RUNNER_TEMP}/release-sums-private-key.asc" \
            "${RUNNER_TEMP}/release-sums-public-key.asc" \
            "${RUNNER_TEMP}/release-sums-passphrase"

      - name: Upload signed SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            dist/rust/release-assets/SHA256SUMS \
            dist/rust/release-assets/SHA256SUMS.asc \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  publish-apt-repository:
    name: Publish APT Repository
    needs: [release-context, publish-release-assets]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false

      # This APT repository is generated from-scratch for the current tag
      # only (see build-linux-release). Re-running an older tag's release
      # would otherwise clobber a newer live repository backwards, so this
      # fails the job unless the live version is older than, or equal to
      # (idempotent re-run), the version being published. A 404 means
      # first publish and is allowed.
      - name: Check APT Pages deploy is monotonic
        run: node scripts/check-apt-monotonic.mjs

      - name: Deploy APT repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish-release:
    name: Publish Release
    needs: [release-context, create-release, publish-release-assets, sign-release-checksums, publish-apt-repository]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false --prerelease=false
