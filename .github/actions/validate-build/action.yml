name: Validate build
description: >-
  Shared frontend and Rust validation gate used by both the CI quality job and the
  release validate-release job, so the release gate cannot drift from CI.
  Expects checkout, project setup, and Linux Tauri desktop dependencies to be
  provided by the calling workflow.

inputs:
  expected-tag:
    description: >-
      Release tag to validate metadata against. Leave empty to validate metadata
      without tag matching, as CI does.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Validate GitHub Actions workflows
      uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
      with:
        version: 1.7.12

    - name: Audit GitHub Actions security
      uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
      with:
        advanced-security: false
        inputs: .github

    - name: Audit frontend dependencies
      shell: bash
      run: bun run frontend:audit

    - name: Enforce maintained file-size policy
      shell: bash
      run: bun run code-size:check

    - name: Check frontend domain terminology
      shell: bash
      run: bun run terminology:check

    - name: Run frontend check
      shell: bash
      run: bun run frontend:check

    - name: Run frontend tests
      shell: bash
      run: bun run frontend:test

    - name: Validate release metadata
      shell: bash
      env:
        EXPECTED_TAG: ${{ inputs.expected-tag }}
      run: |
        if [ -n "${EXPECTED_TAG}" ]; then
          node scripts/check-release-metadata.mjs --expected-tag "${EXPECTED_TAG}"
        else
          node scripts/check-release-metadata.mjs
        fi

    - name: Run release package metadata tests
      shell: bash
      run: bun run linux:metadata:test

    - name: Run release script tests
      shell: bash
      run: bun run release:script-tests

    - name: Build frontend
      shell: bash
      run: bun run frontend:build

    - name: Prove production build excludes E2E bridge
      shell: bash
      run: bun run e2e:isolation

    - name: Validate Tauri prebuilt frontend contract
      shell: bash
      run: bash scripts/check-tauri-prebuilt-frontend.sh

    - name: Check Tauri command bindings
      shell: bash
      run: bun run bindings:check

    - name: Check Tauri command surface
      shell: bash
      run: bun run tauri:commands:check

    - name: Check Rust formatting
      shell: bash
      run: cargo fmt --all --check

    - name: Install cargo-audit
      shell: bash
      run: cargo install cargo-audit --locked

    - name: Audit Rust dependencies
      shell: bash
      run: bun run rust:audit

    - name: Run Rust tests
      shell: bash
      run: cargo test --workspace

    - name: Run Rust clippy
      shell: bash
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Build Rust workspace
      shell: bash
      run: cargo build --workspace

    - name: Smoke test Rust binary
      shell: bash
      run: bun run smoke

    - name: Run built application E2E workflows
      id: built_app_e2e
      shell: bash
      run: xvfb-run -a bun run e2e

    - name: Recheck production build after E2E
      shell: bash
      if: ${{ steps.built_app_e2e.outcome == 'success' }}
      run: bun run e2e:isolation

    - name: Measure large-fixture startup
      id: startup_benchmark
      if: ${{ steps.built_app_e2e.outcome == 'success' }}
      shell: bash
      env:
        QA_SCRIBE_STARTUP_BUDGET_MS: '3000'
        QA_SCRIBE_STARTUP_REUSE_BUILD: '1'
        QA_SCRIBE_STARTUP_RUNNER_CLASS: ubuntu-24.04-github-x64
        QA_SCRIBE_STARTUP_SAMPLES: '3'
      run: xvfb-run -a bun run startup:benchmark

    - name: Write E2E and startup summary
      if: ${{ always() }}
      shell: bash
      run: node scripts/write-quality-summary.mjs

    - name: Retain successful E2E reliability marker
      if: ${{ always() && steps.built_app_e2e.outcome == 'success' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: qa-scribe-e2e-passed-${{ github.run_id }}-${{ github.run_attempt }}
        path: artifacts/e2e/latest-run.json
        retention-days: 90

    - name: Retain failed E2E reliability marker
      if: ${{ always() && steps.built_app_e2e.outcome == 'failure' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: qa-scribe-e2e-failed-${{ github.run_id }}-${{ github.run_attempt }}
        path: artifacts/e2e/latest-run.json
        retention-days: 90

    - name: Upload quality failure evidence
      if: ${{ failure() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: qa-scribe-quality-failure-${{ github.run_id }}-${{ github.run_attempt }}
        path: |
          artifacts/e2e
          artifacts/startup
        if-no-files-found: ignore
        retention-days: 14
