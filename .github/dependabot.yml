version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
